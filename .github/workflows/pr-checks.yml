name: Backend PR Checks

on:
  pull_request:
    branches:
      - master
    paths:
      - 'apps/backend/**'
      - 'packages/**'

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      


      # Install root dependencies (for packages)
      - name: Install root dependencies
        run: npm install

      # Build shared packages
      - name: Build shared packages
        run: npm run packages:build

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm install

      - name: Create .env file for CI
        working-directory: apps/backend
        run: |
          echo "GFW_TOKEN=${{ secrets.GFW_TOKEN }}" >> .env

      # Run backend checks
      - name: Run Backend Lint
        working-directory: apps/backend
        run: npm run lint

      - name: Run Backend Type Check
        working-directory: apps/backend
        run: npm run typecheck

      - name: Verify Backend Startup (Smoke Test)
        working-directory: apps/backend
        run: |
          npm run build
          node dist/src/core/server.js &
          echo $! > server.pid
          sleep 5
          curl -X GET "localhost:1370/system/health"
          kill $(cat server.pid)

      - name: Run Backend Unit Tests
        working-directory: apps/backend
        run: npm test